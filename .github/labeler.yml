# PR Labeler configuration
# See https://github.com/actions/labeler for documentation
#
# IMPORTANT — actions/labeler v6 matcher semantics:
#
#   Without an explicit `any:` or `all:` wrapper, labeler auto-wraps config
#   entries into `any:`, which OR's all matcher entries inside `changed-files`.
#
#   To AND matchers (e.g. positive path selection + lockfile exclusion), you
#   MUST use the `all:` wrapper. Under `all:`, every matcher entry inside
#   `changed-files` must independently pass for the label to apply.
#
#   A negated glob like `!**/*.lock.json` inside `any-glob-to-any-file` is
#   WRONG — it matches any non-lockfile in the entire PR, which is virtually
#   always true, making the positive path globs irrelevant.
#
#   Correct pattern (from the labeler README):
#     label:
#       - all:
#         - changed-files:
#           - any-glob-to-any-file: ['src/**']       # positive selection
#           - all-globs-to-any-file: ['!**/*.lock.json']  # exclusion filter
#
#   Source: https://github.com/actions/labeler/blob/main/README.md
#   Source: https://github.com/actions/labeler/blob/main/src/changedFiles.ts
#     - checkAnyChangedFiles: OR's configs (used under `any:`)
#     - checkAllChangedFiles: AND's configs (used under `all:`)
#
# Prefix taxonomy:
#   module-*          - Core framework/module area labels
#   sample-*          - Sample application labels
#   config-*          - Configuration/policy label groups
#   infra-*           - CI/CD and infrastructure automation
#   documentation-*   - Public documentation site/content
#   complex-*         - High-complexity technical areas
#
# Label naming conventions:
#   module-<name>     - Core modules (filter PRs by subsystem)
#   sample-<name>     - Sample applications
#   module-core-framework - Any change under src/
#   tests             - Any change under tests/
#   semver:<type>     - Version bump type (parsed from PR title suffix)
#   documentation-public-website - Docs changes under docs/
#   config-agentic    - Agent/rules instruction configuration
#   config-github     - GitHub repository configuration/policy files
#   config-dependency-lock - Any *.lock.json dependency lock change
#   infra-ci-cd       - Build/workflow changes
#   complex-source-generation - Source generator projects
#   config-build      - MSBuild/versioning infrastructure
#
# Semver labels (applied by pr-labeler.yml based on PR title):
#   semver:breaking   - Title ends with +semver: breaking
#   semver:feature    - Title ends with +semver: feature
#   semver:fix        - Title ends with +semver: fix
#   semver:skip       - Title ends with +semver: skip
#
# See: .github/instructions/pr-description.instructions.md

# =============================================================================
# MODULE LABELS
# Labels that use `all:` to AND positive path matching with lockfile exclusion.
# This ensures lockfile-only changes don't trigger module labels.
# =============================================================================

module-aqueduct:
  - all:
    - changed-files:
      - any-glob-to-any-file:
          - "src/Aqueduct*/**"
          - "tests/Aqueduct*/**"
      - all-globs-to-any-file:
          - "!**/*.lock.json"

module-common:
  - all:
    - changed-files:
      - any-glob-to-any-file:
          - "src/Common*/**"
          - "tests/Common*/**"
