# =============================================================================
# CROSS-CUTTING LABELS
# =============================================================================

# Source generators deserve special attention (complex, affects DX)
complex-source-generation:
  - all:
    - changed-files:
      - any-glob-to-any-file:
          - "src/Inlet.*.Generators/**"
          - "src/Inlet.Generators.*/**"
          - "tests/Inlet.*.Generators*/**"
      - all-globs-to-any-file:
          - "!**/*.lock.json"

# Agent/rule instructions and agent configuration
# No lockfile exclusion needed — these paths can never be *.lock.json
config-agentic:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/instructions/**"
          - ".github/agents/**"
          - ".cursor/**"
          - "agents.md"

# Root build configuration (high-impact, review carefully)
# No lockfile exclusion needed — explicit file names, none are lockfiles
config-build:
  - changed-files:
      - any-glob-to-any-file:
          - "Directory.Build.props"
          - "Directory.Packages.props"
          - "global.json"
          - "*.slnx"
          - "stryker-config.json"
          - "GitVersion.yml"

# Any dependency lockfile updates (*.lock.json)
config-dependency-lock:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.lock.json"

# GitHub repository configuration and policy files
config-github:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

# Matches GitHub's default 'documentation' label
documentation-public-website:
  - all:
    - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
      - all-globs-to-any-file:
          - "!**/*.lock.json"

# CI/CD and automation
infra-ci-cd:
  - all:
    - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/actions/**"
          - ".github/linters/**"
          - ".config/**"
          - ".config/dotnet-tools.json"
          - "eng/**"
          - "*.ps1"
      - all-globs-to-any-file:
          - "!**/*.lock.json"

# Files changed directly in repository root (no subdirectories)
root:
  - changed-files:
      - any-glob-to-any-file:
          - "*"
          - ".*"

