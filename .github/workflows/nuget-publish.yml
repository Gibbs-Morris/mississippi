# Reusable workflow for NuGet package publishing
# Called by release-nuget.yml - do not trigger directly

name: NuGet Publish

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment name (e.g., nuget-prerelease, nuget-release)"
        required: true
        type: string
      publish-type:
        description: "Label for the publish type (e.g., Prerelease, Release)"
        required: true
        type: string
      artifact-pattern:
        description: "Pattern to match artifact names"
        required: false
        type: string
        default: "nuget-*"
    secrets:
      NUGET_USER:
        description: "NuGet username for OIDC authentication"
        required: true

jobs:
  publish:
    name: Publish ${{ inputs.publish-type }} to NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}

    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ${{ inputs.artifact-pattern }}
          path: artifacts/nuget
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/nuget

      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages
        run: |
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          # Only push symbol packages if they exist
          if compgen -G "artifacts/nuget/*.snupkg" > /dev/null; then
            dotnet nuget push "artifacts/nuget/*.snupkg" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          fi

      - name: Publish summary
        if: always()
        env:
          PUBLISH_TYPE: ${{ inputs.publish-type }}
          ENVIRONMENT: ${{ inputs.environment }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "## NuGet Publish Summary ($PUBLISH_TYPE)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`$ENVIRONMENT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** \`$BRANCH_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Packages" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for pkg in artifacts/nuget/*.nupkg; do
            [ -f "$pkg" ] && echo "- \`$(basename "$pkg")\`" >> "$GITHUB_STEP_SUMMARY"
          done
          for pkg in artifacts/nuget/*.snupkg; do
            [ -f "$pkg" ] && echo "- \`$(basename "$pkg")\`" >> "$GITHUB_STEP_SUMMARY"
          done
