name: "Project Reference Hygiene Gate"
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CONFIGURATION: Release
  REFERENCE_TRIMMER_VERSION: 3.4.5

jobs:
  project-reference-hygiene:
    name: "Fail on Unused ProjectReference (RT0002)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - solution: mississippi.slnx
            artifact_suffix: mississippi-slnx
          - solution: samples.slnx
            artifact_suffix: samples-slnx

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Inject ReferenceTrimmer into all projects
        shell: pwsh
        run: |
          $directoryPackagesPath = Join-Path $env:GITHUB_WORKSPACE 'Directory.Packages.props'
          $usesCpm = Test-Path $directoryPackagesPath
          if ($usesCpm) {
            [xml]$directoryPackages = Get-Content -Path $directoryPackagesPath
            $root = $directoryPackages.Project
            if ($null -eq $root) {
              throw "Directory.Packages.props does not contain a <Project> root element."
            }

            $packageVersionNode = $directoryPackages.SelectSingleNode("/Project/ItemGroup/PackageVersion[@Include='ReferenceTrimmer']")
            if ($null -eq $packageVersionNode) {
              $itemGroup = $directoryPackages.CreateElement('ItemGroup')
              $packageVersion = $directoryPackages.CreateElement('PackageVersion')
              $packageVersion.SetAttribute('Include', 'ReferenceTrimmer')
              $packageVersion.SetAttribute('Version', $env:REFERENCE_TRIMMER_VERSION)
              $itemGroup.AppendChild($packageVersion) | Out-Null
              $root.AppendChild($itemGroup) | Out-Null
              $directoryPackages.Save($directoryPackagesPath)
              Write-Host "Added PackageVersion(ReferenceTrimmer=$($env:REFERENCE_TRIMMER_VERSION)) to Directory.Packages.props"
            }
          }

          $directoryBuildPath = Join-Path $env:GITHUB_WORKSPACE 'Directory.Build.props'
          if (-not (Test-Path $directoryBuildPath)) {
            throw "Directory.Build.props not found at repository root."
          }

          [xml]$directoryBuild = Get-Content -Path $directoryBuildPath
          $buildRoot = $directoryBuild.Project
          if ($null -eq $buildRoot) {
            throw "Directory.Build.props does not contain a <Project> root element."
          }

          $existingInjection = $directoryBuild.SelectSingleNode("/Project/ItemGroup[@Label='ReferenceTrimmerCiInjection']")
          if ($null -eq $existingInjection) {
            $itemGroup = $directoryBuild.CreateElement('ItemGroup')
            $itemGroup.SetAttribute('Label', 'ReferenceTrimmerCiInjection')
            $itemGroup.SetAttribute('Condition', "'`$(EnableReferenceTrimmer)' == 'true'")

            $packageReference = $directoryBuild.CreateElement('PackageReference')
            $packageReference.SetAttribute('Include', 'ReferenceTrimmer')
            $packageReference.SetAttribute('PrivateAssets', 'all')

            if (-not $usesCpm) {
              $packageReference.SetAttribute('Version', $env:REFERENCE_TRIMMER_VERSION)
            }

            $itemGroup.AppendChild($packageReference) | Out-Null
            $buildRoot.AppendChild($itemGroup) | Out-Null
            $directoryBuild.Save($directoryBuildPath)
            Write-Host "Injected ReferenceTrimmer PackageReference into Directory.Build.props"
          }

      - name: Restore solution
        run: dotnet restore ${{ github.workspace }}/${{ matrix.solution }} -p:EnableReferenceTrimmer=true

      - name: Build with ReferenceTrimmer and fail on RT0002
        shell: pwsh
        run: |
          $solutionPath = Join-Path $env:GITHUB_WORKSPACE '${{ matrix.solution }}'
          $logPath = Join-Path $env:RUNNER_TEMP ('rt0002-' + '${{ matrix.solution }}'.Replace('/', '_').Replace('.', '_') + '.log')

          dotnet build $solutionPath --configuration $env:CONFIGURATION --no-restore -warnaserror -p:EnableReferenceTrimmer=true -p:GenerateDocumentationFile=true 2>&1 | Tee-Object -FilePath $logPath
          if ($LASTEXITCODE -ne 0) {
            throw "Build failed before RT0002 evaluation."
          }

          $matchedLines = Select-String -Path $logPath -Pattern 'RT0002: ProjectReference .+ can be removed'
          $entryPattern = 'RT0002: ProjectReference (?<Reference>.+?) can be removed \[(?<Owner>.+?\.csproj)\]'

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## RT0002 Report (${{ matrix.solution }})"
          if ($matchedLines) {
            $entries = @()
            foreach ($match in $matchedLines) {
              if ($match.Line -match $entryPattern) {
                $entries += [PSCustomObject]@{
                  Owner = $Matches.Owner
                  Reference = $Matches.Reference
                }
              }
            }

            $deduped = $entries | Sort-Object Owner, Reference -Unique
            $grouped = $deduped | Group-Object Owner | Sort-Object Name

            Write-Host "Unused ProjectReferences found (RT0002):"
            foreach ($group in $grouped) {
              Write-Host "- $($group.Name)"
              foreach ($item in ($group.Group | Sort-Object Reference)) {
                Write-Host "  - $($item.Reference)"
              }
            }

            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Found $($deduped.Count) removable project reference(s)."
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| Owner Project | Removable ProjectReference |"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| --- | --- |"
            foreach ($item in $deduped) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "| ``$($item.Owner)`` | ``$($item.Reference)`` |"
            }

            throw "RT0002 findings detected."
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "No RT0002 findings."
          Write-Host "No RT0002 findings for $solutionPath"

      - name: Upload RT0002 logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rt0002-logs-${{ matrix.artifact_suffix }}
          path: ${{ runner.temp }}/rt0002-*.log
