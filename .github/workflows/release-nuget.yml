name: NuGet Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONFIGURATION: Release

jobs:
  build-pack:
    name: Build and Pack
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache GitVersion tools
        uses: actions/cache@v4
        with:
          path: ~/.gitversion
          key: ${{ runner.os }}-gitversion
          restore-keys: ${{ runner.os }}-gitversion

      - name: Cache nugets
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/packages.*.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/packages.*.lock.json') }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: "6.0.5"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.2.1
        with:
          useConfigFile: true

      - name: Print resolved version
        run: |
          echo "GitVersion SemVer: ${{ steps.gitversion.outputs.SemVer }}"
          echo "GitVersion NuGetVersionV2: ${{ steps.gitversion.outputs.NuGetVersionV2 }}"

      - name: Restore
        run: dotnet restore ${{ github.workspace }}/mississippi.slnx

      - name: Build
        run: dotnet build ${{ github.workspace }}/mississippi.slnx --configuration ${{ env.CONFIGURATION }} --no-restore --no-incremental -warnaserror -p:Version=${{ steps.gitversion.outputs.SemVer }}

      - name: Test (L0/L1)
        run: dotnet test ${{ github.workspace }}/mississippi.slnx --configuration ${{ env.CONFIGURATION }} --no-build --filter "FullyQualifiedName~.L0Tests.|FullyQualifiedName~.L1Tests."

      - name: Pack
        run: |
          dotnet pack ${{ github.workspace }}/mississippi.slnx \
            --configuration ${{ env.CONFIGURATION }} \
            --no-build \
            --output ${{ github.workspace }}/artifacts/nuget \
            -p:PackageVersion=${{ steps.gitversion.outputs.NuGetVersionV2 }}

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ steps.gitversion.outputs.NuGetVersionV2 }}
          path: artifacts/nuget/*
          if-no-files-found: error

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: build-pack
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    environment: ${{ startsWith(github.ref, 'refs/heads/release/') && 'nuget-release' || 'nuget-prerelease' }}

    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nuget-*
          path: artifacts/nuget
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/nuget

      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push packages
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path "artifacts/nuget" -Filter "*.nupkg" -File |
            Where-Object { $_.Name -notlike "*.symbols.nupkg" }

          if (-not $packages) {
            throw "No .nupkg files found to publish."
          }

          foreach ($package in $packages) {
            Write-Host "Publishing $($package.Name)..."
            dotnet nuget push $package.FullName `
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
          }
