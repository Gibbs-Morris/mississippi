name: NuGet Release

on:
  push:
    branches:
      - main
      - release/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONFIGURATION: Release

jobs:
  build-pack:
    name: Build and Pack
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Cache GitVersion tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.gitversion
          key: ${{ runner.os }}-gitversion
          restore-keys: ${{ runner.os }}-gitversion

      - name: Cache nugets
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/packages.*.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@51d325634925d7d9ce0a7efc2c586c0bc2b9eee6 # v3.2.1
        with:
          versionSpec: "6.5.1"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@51d325634925d7d9ce0a7efc2c586c0bc2b9eee6 # v3.2.1
        with:
          useConfigFile: true

      - name: Print resolved version
        run: |
          echo "GitVersion SemVer: ${{ steps.gitversion.outputs.SemVer }}"
          echo "GitVersion FullSemVer: ${{ steps.gitversion.outputs.FullSemVer }}"

      - name: Restore
        run: dotnet restore ${{ github.workspace }}/mississippi.slnx

      - name: Build
        run: dotnet build ${{ github.workspace }}/mississippi.slnx --configuration ${{ env.CONFIGURATION }} --no-restore --no-incremental -warnaserror -p:Version=${{ steps.gitversion.outputs.SemVer }}

      - name: Test (L0/L1)
        run: dotnet test ${{ github.workspace }}/mississippi.slnx --configuration ${{ env.CONFIGURATION }} --no-build --filter "FullyQualifiedName~.L0Tests.|FullyQualifiedName~.L1Tests."

      - name: Pack
        run: |
          dotnet pack ${{ github.workspace }}/mississippi.slnx \
            --configuration ${{ env.CONFIGURATION }} \
            --no-build \
            --output ${{ github.workspace }}/artifacts/nuget \
            -p:PackageVersion=${{ steps.gitversion.outputs.SemVer }}

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-${{ steps.gitversion.outputs.SemVer }}
          path: artifacts/nuget/*
          if-no-files-found: error

  # ===========================================================================
  # Publish jobs - exactly one runs based on branch
  # Calls reusable workflow from the same branch/commit
  # ===========================================================================

  publish-prerelease:
    name: Publish Prerelease
    needs: build-pack
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/nuget-publish.yml
    with:
      environment: nuget-prerelease
      publish-type: Prerelease
    secrets:
      NUGET_USER: ${{ secrets.NUGET_USER }}

  publish-release:
    name: Publish Release
    needs: build-pack
    if: startsWith(github.ref, 'refs/heads/release/')
    uses: ./.github/workflows/nuget-publish.yml
    with:
      environment: nuget-release
      publish-type: Release
    secrets:
      NUGET_USER: ${{ secrets.NUGET_USER }}
